<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>华深智药 · 密码自助重置</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; }
    body { font-family:'Microsoft YaHei',Arial,sans-serif;
           background:linear-gradient(135deg,#0b1e3f 0%,#15376b 50%,#1f5fa8 100%);
           min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
    #bg-host { position:fixed; inset:0; z-index:0; }
    .wrap { position:relative; z-index:2; width:100%; max-width:430px; text-align:center; }
    .logo { height:62px; margin:0 auto 18px; display:block; object-fit:contain;
            filter:drop-shadow(0 4px 14px rgba(0,0,0,.35)); }
    .card { background:rgba(255,255,255,.98); border-radius:18px;
            box-shadow:0 24px 70px rgba(0,0,0,.34); overflow:hidden;
            border:1px solid rgba(255,255,255,.25); }
    .head { padding:22px 26px 4px; text-align:center; }
    .head h1 { font-size:20px; color:#15376b; margin-bottom:4px; letter-spacing:1px; }
    .head p { font-size:13px; color:#8a94a6; }
    .body { padding:18px 26px 28px; text-align:left; }
    .step { display:none; } .step.active { display:block; }
    label { display:block; font-size:13px; color:#333; margin-bottom:6px; font-weight:600; }
    input { width:100%; padding:11px 13px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; margin-bottom:14px; transition:border-color .2s; }
    input:focus { outline:none; border-color:#1f5fa8; }
    .row { display:flex; gap:10px; } .row input { margin-bottom:14px; }
    button { width:100%; padding:13px; border:none; border-radius:8px; font-size:15px; font-weight:700;
             color:#fff; background:linear-gradient(135deg,#15376b,#1f5fa8); cursor:pointer; transition:opacity .2s; }
    button:hover { opacity:.92; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .btn-ghost { background:#eee; color:#666; margin-top:10px; }
    .msg { font-size:13px; padding:10px 12px; border-radius:6px; margin-bottom:14px; display:none; }
    .msg.ok { background:#f0f9eb; color:#67C23A; display:block; }
    .msg.err { background:#fef0f0; color:#f56c6c; display:block; }
    .hint { font-size:12px; color:#999; margin-top:14px; line-height:1.6; }
    @keyframes draw-circle { to { stroke-dashoffset:0; } }
    @keyframes draw-check { to { stroke-dashoffset:0; } }
    @keyframes fade-up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes float-up { 0%{opacity:1;transform:translateY(0) rotate(0)} 100%{opacity:0;transform:translateY(-140px) rotate(360deg)} }
    .success-title { color:#67C23A; margin:18px 0 12px; font-size:24px; animation:fade-up .5s ease .7s both; }
    .info-ok { background:#f0f9eb; color:#67C23A; padding:14px 16px; border-radius:8px; margin:10px 0; font-size:15px; font-weight:600; border:1px solid #e1f3d8; animation:fade-up .5s ease .9s both; }
    .info-warn { background:#fff7e6; color:#E6A23C; padding:14px 16px; border-radius:8px; margin:10px 0; font-size:14px; border:1px solid #fdecc8; animation:fade-up .5s ease 1.1s both; }
    .confetti { position:absolute; font-size:22px; pointer-events:none; animation:float-up 1.8s ease-out forwards; opacity:0; }
  </style>
</head>
<body>
  <div id="bg-host"></div>
  <div class="wrap">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="华深智药" class="logo">
    <div class="card">
      <div class="head">
        <h1>密码自助重置</h1>
        <p>验证邮箱与手机号即可重置密码</p>
      </div>
      <div class="body">

        <!-- 步骤 1 -->
        <div class="step active" id="step1">
          <div class="msg" id="msg1"></div>
          <label>邮箱</label>
          <input id="email" type="text" placeholder="name@helixon.com">
          <label>手机号</label>
          <input id="phone" type="tel" placeholder="薪福通预留手机号">
          <button onclick="verifyIdentity()">下一步：验证身份</button>
          <p class="hint">若手机号与登记不一致，请联系 IT/管理员更新。</p>
        </div>

        <!-- 步骤 3 -->
        <div class="step" id="step3">
          <div class="msg" id="msg3"></div>
          <label>短信验证码</label>
          <input id="code" type="text" maxlength="6" placeholder="6 位验证码" style="margin-bottom:8px">
          <button type="button" id="resendBtn" onclick="resendCode(this)" style="display:block;margin-left:auto;margin-bottom:14px;padding:6px 18px;font-size:13px;font-weight:400;width:auto;border-radius:6px">60s 后重新获取</button>
          <button onclick="verifyCode()">下一步：验证码校验</button>
          <button class="btn-ghost" onclick="go(1)">返回</button>
        </div>

        <!-- 步骤 4 -->
        <div class="step" id="step4">
          <div class="msg" id="msg4"></div>
          <label>新密码</label>
          <input id="newpw" type="password" placeholder="至少 8 位，含大小写字母、数字、特殊字符">
          <label>确认新密码</label>
          <input id="confirmpw" type="password" placeholder="再次输入新密码">
          <button onclick="doReset()">重置密码</button>
          <p class="hint">重置后此密码直接可用；云服务（邮箱/M365 等）可能需 2-3 分钟生效。</p>
        </div>

        <!-- 步骤 5 成功（动画） -->
        <div class="step" id="step5" style="position:relative;overflow:hidden">
          <div style="text-align:center;padding:30px 10px">
            <svg width="84" height="84" viewBox="0 0 84 84" style="display:block;margin:0 auto">
              <circle cx="42" cy="42" r="38" fill="none" stroke="#67C23A" stroke-width="4"
                      stroke-dasharray="239" stroke-dashoffset="239"
                      style="animation:draw-circle .6s ease forwards"/>
              <path d="M24 44 L36 56 L60 28" fill="none" stroke="#67C23A" stroke-width="6"
                    stroke-linecap="round" stroke-linejoin="round"
                    stroke-dasharray="60" stroke-dashoffset="60"
                    style="animation:draw-check .4s ease .5s forwards"/>
            </svg>
            <h2 class="success-title">恭喜！密码重置成功</h2>
            <div class="info-ok">✅ 请使用新密码登录系统</div>
            <div class="info-warn">⏰ 云服务（邮箱 / M365 等）可能需要 2-3 分钟生效</div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script src="{{ url_for('static', filename='p5.min.js') }}?v=1"></script>
<script src="{{ url_for('static', filename='bg.js') }}?v=4"></script>
<script>
  const CSRF = "{{ csrf_token() }}";
  function headers(json){ const h={}; if(json) h['Content-Type']='application/json'; h['X-CSRFToken']=CSRF; return h; }
  function show(id,msg,cls){ const e=document.getElementById(id); e.textContent=msg; e.className='msg '+(cls||''); }
  function go(n){ document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById('step'+n).classList.add('active'); }
  async function post(url,body){ const r=await fetch(url,{method:'POST',headers:headers(true),body:JSON.stringify(body),credentials:'same-origin'}); return r.json(); }

  async function verifyIdentity(){
    const email=document.getElementById('email').value.trim();
    const phone=document.getElementById('phone').value.trim();
    if(!email||!phone){ show('msg1','请输入邮箱和手机号','err'); return; }
    show('msg1','正在验证...','ok');
    const d=await post('/reset/verify-identity',{email,phone});
    let extra = '';
    if (d.demo_code) { extra = '（演示模式，本次验证码：' + d.demo_code + '）'; }
    show('msg1', d.message + extra, d.success?'ok':'err');
    if(d.success){ go(3); startCountdown(document.getElementById('resendBtn')); }
  }
  let _cdTimer = null;
  function startCountdown(btn){
    let sec = 60;
    btn.disabled = true;
    btn.textContent = sec + 's 后重新获取';
    if(_cdTimer) clearInterval(_cdTimer);
    _cdTimer = setInterval(function(){
      sec--;
      if(sec<=0){ clearInterval(_cdTimer); btn.disabled=false; btn.textContent='重新发送'; }
      else { btn.textContent = sec + 's 后重新获取'; }
    }, 1000);
  }
  async function resendCode(btn){
    const d=await post('/reset/send-code',{});
    show('msg3',d.message,d.success?'ok':'err');
    if(d.success){ startCountdown(btn); }
  }
  async function verifyCode(){
    const code=document.getElementById('code').value.trim();
    const d=await post('/reset/verify-code',{code});
    show('msg3',d.message,d.success?'ok':'err');
    if(d.success){ go(4); }
  }
  async function doReset(){
    const np=document.getElementById('newpw').value, cp=document.getElementById('confirmpw').value;
    if(np!==cp){ show('msg4','两次输入的新密码不一致','err'); return; }
    const d=await post('/reset/do-reset',{new_password:np,confirm_password:cp});
    show('msg4',d.message,d.success?'ok':'err');
    if(d.success){ go(5); celebrate(); }
  }
  function celebrate(){
    const emojis=['🎉','🎊','✨','🎈','⭐'];
    const box=document.getElementById('step5');
    for(let i=0;i<14;i++){
      const e=document.createElement('div');
      e.className='confetti';
      e.textContent=emojis[i%emojis.length];
      e.style.left=(10+Math.random()*80)+'%';
      e.style.top='20px';
      e.style.animationDelay=(Math.random()*0.6)+'s';
      box.appendChild(e);
      setTimeout(()=>e.remove(),2800);
    }
  }
  }
</script>
</body>
</html>
