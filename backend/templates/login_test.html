<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
            margin: 10px;
            border: none;
            cursor: pointer;
        }
        .button:hover {
            transform: translateY(-2px);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 14px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 登录测试页面</h1>
        <p>如果前端登录按钮无反应，请使用以下方法登录:</p>
        
        <div style="margin: 30px 0;">
            <a href="/login" class="button">
                方式 1: 直接访问后端登录页
            </a>
        </div>
        
        <div style="margin: 30px 0;">
            <button onclick="testLogin()" class="button">
                方式 2: 测试跳转功能
            </button>
        </div>
        
        <div style="margin: 30px 0;">
            <button onclick="clearCache()" class="button" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                清除缓存并刷新
            </button>
        </div>
        
        <div id="status"></div>
    </div>
    
    <script>
        function testLogin() {
            document.getElementById('status').innerHTML = 
                '<div class="status">正在跳转到 /login...</div>';
            
            setTimeout(() => {
                window.location.href = '/login';
            }, 100);
        }
        
        function clearCache() {
            document.getElementById('status').innerHTML = 
                '<div class="status">正在清除缓存...</div>';
            
            // 清除所有 localStorage
            localStorage.clear();
            sessionStorage.clear();
            
            // 强制刷新
            setTimeout(() => {
                window.location.reload(true);
            }, 500);
        }
        
        // 页面加载时检查状态
        window.onload = function() {
            fetch('/login')
                .then(response => {
                    if (response.ok) {
                        document.getElementById('status').innerHTML = 
                            '<div class="status success">✅ 后端登录页面可访问</div>';
                    } else {
                        document.getElementById('status').innerHTML = 
                            '<div class="status error">❌ 后端登录页面无法访问</div>';
                    }
                })
                .catch(error => {
                    document.getElementById('status').innerHTML = 
                        '<div class="status error">❌ 错误：' + error.message + '</div>';
                });
        }
    </script>
</body>
</html>
